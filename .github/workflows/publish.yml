name: Publish to npm

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Bump version from npm registry and publish
        run: |
          # Get the latest published version from npm (or default to 0.1.0)
          CURRENT=$(npm view @yemi33/squad version 2>/dev/null || echo "0.1.0")
          echo "Current npm version: $CURRENT"

          # Bump patch: 0.1.1 → 0.1.2, etc.
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "Publishing version: $NEXT"

          # Update package.json with the new version
          node -e "const p=require('./package.json'); p.version='$NEXT'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

          # Publish
          npm publish --access public

          # Commit the version bump back to the repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to $NEXT [skip ci]"
          git push
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
