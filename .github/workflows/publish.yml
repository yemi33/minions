name: Publish to npm

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Bump version, update changelog, and publish
        run: |
          # Get the latest published version from npm (or default to 0.1.0)
          CURRENT=$(npm view @yemi33/minions version 2>/dev/null || echo "0.1.0")
          echo "Current npm version: $CURRENT"

          # Bump patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
          TODAY=$(date +%Y-%m-%d)
          echo "Publishing version: $NEXT"

          # Update package.json
          node -e "const p=require('./package.json'); p.version='$NEXT'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

          # Find changed files: compare against the last [skip ci] commit (previous publish)
          # Only include files that EXIST in the current tree (excludes stripped files)
          LAST_PUBLISH=$(git log --oneline --grep='\[skip ci\]' -1 --format='%H' 2>/dev/null || echo "")
          if [ -n "$LAST_PUBLISH" ]; then
            git diff --name-only --diff-filter=ACMR "$LAST_PUBLISH" HEAD -- . ':!package.json' ':!CHANGELOG.md' > /tmp/changed_files.txt 2>/dev/null || true
          else
            # First publish — list all tracked files as "changed"
            git ls-files -- . ':!package.json' ':!CHANGELOG.md' ':!.gitignore' ':!.npmignore' ':!LICENSE' ':!notes/' > /tmp/changed_files.txt 2>/dev/null || true
          fi

          # Generate changelog from commit messages (not file lists)
          cat > /tmp/update-changelog.js << 'SCRIPT'
          const fs = require('fs');
          const { execSync } = require('child_process');
          const version = process.argv[2];
          const date = process.argv[3];
          const lastPublish = process.argv[4] || '';

          // Get commit messages since last publish
          let commits = [];
          try {
            const range = lastPublish ? `${lastPublish}..HEAD` : 'HEAD~20..HEAD';
            const log = execSync(`git log ${range} --pretty=format:"%s" --no-merges`, { encoding: 'utf8' }).trim();
            commits = log.split('\n').filter(Boolean);
          } catch { /* fallback: no commits */ }

          // Filter out noise
          commits = commits.filter(m =>
            !m.includes('[skip ci]') &&
            !m.startsWith('chore: publish') &&
            !m.startsWith('Merge ')
          );
          if (commits.length === 0) process.exit(0);

          // Group by conventional commit prefix
          const groups = { 'Features': [], 'Fixes': [], 'Other': [] };
          for (const m of commits) {
            // Strip Co-Authored-By suffix
            const clean = m.replace(/\s*Co-Authored-By:.*$/i, '').trim();
            if (m.startsWith('feat:') || m.startsWith('feat(')) groups.Features.push(clean.replace(/^feat[:(]/, '').replace(/^[^:]*:\s*/, ''));
            else if (m.startsWith('fix:') || m.startsWith('fix(')) groups.Fixes.push(clean.replace(/^fix[:(]/, '').replace(/^[^:]*:\s*/, ''));
            else if (m.startsWith('docs:')) groups.Other.push(clean);
            else if (m.startsWith('ui:')) groups.Fixes.push(clean.replace(/^ui:\s*/, ''));
            else if (m.startsWith('test:')) { /* skip test-only commits */ }
            else groups.Other.push(clean);
          }

          let entry = `## ${version} (${date})\n\n`;
          let hasContent = false;
          for (const [cat, items] of Object.entries(groups)) {
            if (items.length === 0) continue;
            hasContent = true;
            entry += `### ${cat}\n`;
            // Deduplicate and limit
            const unique = [...new Set(items)].slice(0, 20);
            for (const item of unique) entry += `- ${item}\n`;
            entry += '\n';
          }
          if (!hasContent) process.exit(0);

          if (!fs.existsSync('CHANGELOG.md')) fs.writeFileSync('CHANGELOG.md', '# Changelog\n\n');
          const cl = fs.readFileSync('CHANGELOG.md', 'utf8');
          const idx = cl.indexOf('\n\n');
          if (idx !== -1) {
            fs.writeFileSync('CHANGELOG.md', cl.slice(0, idx + 2) + entry + cl.slice(idx + 2));
            console.log('Changelog updated with ' + commits.length + ' commits');
          }
          SCRIPT

          node /tmp/update-changelog.js "$NEXT" "$TODAY" "$LAST_PUBLISH"

          # Publish
          npm publish --access public

          # Commit version bump + changelog via PR.
          # Branch commit has NO [skip ci] so required status checks run.
          # PR title has [skip ci] so the squash-merged commit on master
          # won't re-trigger this publish workflow.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git diff --cached --quiet && echo "No changes to commit" || {
            BRANCH="chore/publish-$NEXT"
            git checkout -b "$BRANCH"
            git commit -m "chore: publish $NEXT — changelog updated"
            git push origin "$BRANCH"
            gh pr create --title "chore: publish $NEXT [skip ci]" --body "Auto-generated version bump and changelog update." --base master --head "$BRANCH"

            # Close any stale publish PRs left over from previous runs
            gh pr list --state open --json number,title --jq ".[] | select(.title | startswith(\"chore: publish\")) | select(.number != $(gh pr view "$BRANCH" --json number --jq .number)) | .number" | while read pr; do
              gh pr close "$pr" --delete-branch 2>/dev/null || true
            done

            # Auto-merge once CI passes (squash so commit message inherits PR title with [skip ci])
            gh pr merge "$BRANCH" --auto --squash --delete-branch
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ github.token }}

